<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Iron Metrics - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center h-screen">
    <div class="bg-slate-900 p-10 rounded-3xl border border-slate-800 shadow-2xl w-96">
        <h1 class="text-3xl font-black mb-6 text-center italic">IRON <span class="text-emerald-500">METRICS</span></h1>
        <form method="POST" class="space-y-4">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase">Senha de Acesso</label>
                <input type="password" name="password" class="w-full bg-black border border-slate-700 p-3 rounded-xl mt-1 outline-none focus:border-emerald-500" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition">ENTRAR</button>
        </form>
    </div>
</body>
</html>
