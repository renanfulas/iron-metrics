{% extends "layout.html" %}
{% block content %}
<div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center mb-12">
        <h1 class="text-4xl font-black text-white italic underline decoration-emerald-500">ALUNOS</h1>
        <form action="/add_student" method="POST" class="flex gap-2">
            <input type="text" name="name" placeholder="Nome do Aluno" class="bg-slate-900 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-emerald-500">
            <button class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-xl font-bold transition">ADICIONAR</button>
        </form>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for s in students %}
        <a href="/student/{{ s.id }}" class="iron-card p-8 rounded-3xl hover:border-emerald-500/50 transition group">
            <h3 class="text-2xl font-bold text-white mb-2 group-hover:text-emerald-400">{{ s.name }}</h3>
            <p class="text-slate-500 text-sm">Ver evolução e medidas →</p>
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
